<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCP Hub — Local MCP Server Dashboard</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#1A0D00;--bg2:#241200;--bg3:#2E1800;--bg4:#3A2000;
    --gold:#DDC165;--gold-light:#FFE9A3;--orange:#E5591C;
    --text:#E8D5B8;--text-dim:#9A8568;--text-bright:#FFF3DC;
    --green:#4ADE80;--red:#F87171;--blue:#60A5FA;--purple:#C084FC;
    --radius:10px;--glow:0 0 20px rgba(221,193,101,0.15);
  }
  html{font-size:15px}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',system-ui,sans-serif;
    background:var(--bg);color:var(--text);min-height:100vh;
    display:flex;flex-direction:column;overflow-x:hidden;
  }

  /* ── Particle background ── */
  #particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}

  /* ── Header ── */
  .menubar{
    background:linear-gradient(180deg,rgba(46,24,0,0.95),rgba(26,13,0,0.95));
    border-bottom:1px solid rgba(221,193,101,0.12);
    padding:10px 24px;display:flex;align-items:center;gap:14px;
    position:sticky;top:0;z-index:100;
    backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  }
  .menubar-icon{
    width:34px;height:34px;border-radius:9px;
    background:linear-gradient(135deg,var(--orange),var(--gold));
    display:flex;align-items:center;justify-content:center;
    font-size:17px;box-shadow:0 2px 12px rgba(229,89,28,0.5);
    animation:iconPulse 3s ease-in-out infinite;
  }
  @keyframes iconPulse{0%,100%{box-shadow:0 2px 12px rgba(229,89,28,0.5)}50%{box-shadow:0 2px 24px rgba(229,89,28,0.8)}}
  .menubar h1{font-size:1.05rem;font-weight:700;color:var(--gold-light);letter-spacing:-0.02em}
  .menubar .subtitle{font-size:0.7rem;color:var(--text-dim);margin-left:4px}
  .menubar-actions{margin-left:auto;display:flex;gap:8px;align-items:center}
  .server-count{
    background:var(--bg4);border:1px solid rgba(221,193,101,0.2);
    border-radius:20px;padding:4px 12px;font-size:0.72rem;color:var(--gold);font-weight:500;
  }
  .search-wrap{position:relative}
  .search-input{
    background:var(--bg4);border:1px solid rgba(221,193,101,0.15);
    color:var(--text-bright);padding:6px 12px 6px 30px;border-radius:8px;
    font-size:0.78rem;width:220px;outline:none;transition:all 0.2s;
    font-family:inherit;
  }
  .search-input:focus{border-color:var(--gold);width:280px;box-shadow:0 0 16px rgba(221,193,101,0.1)}
  .search-input::placeholder{color:var(--text-dim)}
  .search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:0.7rem;color:var(--text-dim)}
  .search-results{
    position:absolute;top:calc(100% + 6px);right:0;width:400px;
    background:var(--bg3);border:1px solid rgba(221,193,101,0.2);
    border-radius:var(--radius);max-height:400px;overflow-y:auto;
    box-shadow:0 16px 48px rgba(0,0,0,0.6);display:none;z-index:200;
  }
  .search-results.visible{display:block}
  .search-result-item{
    padding:10px 14px;cursor:pointer;border-bottom:1px solid rgba(221,193,101,0.06);
    transition:background 0.1s;
  }
  .search-result-item:hover{background:var(--bg4)}
  .search-result-item:last-child{border-bottom:none}
  .sr-name{font-size:0.82rem;font-weight:600;color:var(--gold-light)}
  .sr-server{font-size:0.65rem;color:var(--text-dim);margin-top:1px}
  .sr-desc{font-size:0.72rem;color:var(--text-dim);margin-top:2px}
  .sr-highlight{color:var(--orange);font-weight:600}

  .icon-btn{
    background:var(--bg3);border:1px solid rgba(221,193,101,0.15);
    color:var(--gold);width:32px;height:32px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    font-size:0.85rem;transition:all 0.15s;
  }
  .icon-btn:hover{background:var(--bg4);border-color:var(--gold)}

  /* ── Main layout ── */
  .app{display:flex;flex:1;min-height:0;position:relative;z-index:1}

  /* ── Sidebar ── */
  .sidebar{
    width:260px;min-width:260px;background:rgba(36,18,0,0.92);
    border-right:1px solid rgba(221,193,101,0.08);
    display:flex;flex-direction:column;overflow:hidden;
    backdrop-filter:blur(16px);
  }
  .sidebar-header{
    padding:14px 16px 10px;font-size:0.65rem;text-transform:uppercase;
    letter-spacing:0.12em;color:var(--text-dim);font-weight:700;
    display:flex;align-items:center;justify-content:space-between;
  }
  .view-toggle{display:flex;gap:2px}
  .view-toggle button{
    background:none;border:1px solid rgba(221,193,101,0.1);color:var(--text-dim);
    width:26px;height:22px;border-radius:5px;cursor:pointer;font-size:0.65rem;
    transition:all 0.15s;display:flex;align-items:center;justify-content:center;
  }
  .view-toggle button.active{background:var(--bg4);color:var(--gold);border-color:rgba(221,193,101,0.25)}
  .server-list{flex:1;overflow-y:auto;padding:6px 8px}
  .server-item{
    padding:10px 12px;border-radius:8px;cursor:pointer;
    margin-bottom:2px;transition:all 0.15s ease;display:flex;align-items:center;gap:10px;
    position:relative;overflow:hidden;
  }
  .server-item:hover{background:rgba(58,32,0,0.6)}
  .server-item.active{background:var(--bg4);box-shadow:inset 3px 0 0 var(--gold)}
  .server-dot{
    width:8px;height:8px;border-radius:50%;flex-shrink:0;
    background:var(--green);box-shadow:0 0 8px rgba(74,222,128,0.6);
    animation:dotPulse 2.5s ease-in-out infinite;
  }
  @keyframes dotPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.6;transform:scale(0.85)}}
  .server-dot.stdio{background:var(--blue);box-shadow:0 0 8px rgba(96,165,250,0.6)}
  .server-dot.sse{background:var(--green);box-shadow:0 0 8px rgba(74,222,128,0.6)}
  .server-dot.error{background:var(--red);box-shadow:0 0 8px rgba(248,113,113,0.6)}
  .server-name{font-size:0.82rem;font-weight:500;color:var(--text-bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .server-type{font-size:0.62rem;color:var(--text-dim);margin-top:2px}
  .server-info{overflow:hidden}
  .tool-count-badge{
    margin-left:auto;background:rgba(221,193,101,0.1);
    padding:2px 7px;border-radius:10px;font-size:0.62rem;color:var(--gold);
    font-weight:600;flex-shrink:0;
  }

  /* ── Stats bar ── */
  .stats-bar{
    padding:12px 16px;border-top:1px solid rgba(221,193,101,0.08);
    display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;
  }
  .stat-item{text-align:center}
  .stat-value{font-size:1.1rem;font-weight:700;color:var(--gold-light)}
  .stat-label{font-size:0.58rem;text-transform:uppercase;letter-spacing:0.1em;color:var(--text-dim);margin-top:1px}

  /* ── Main panel ── */
  .main{flex:1;overflow-y:auto;padding:0;display:flex;flex-direction:column;position:relative}

  /* ── Welcome / drop zone ── */
  .welcome{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;gap:20px;padding:40px 24px;
  }
  .drop-zone{
    width:100%;max-width:520px;border:2px dashed rgba(221,193,101,0.2);
    border-radius:20px;padding:48px 32px;transition:all 0.3s ease;
    cursor:pointer;position:relative;background:rgba(36,18,0,0.4);
  }
  .drop-zone:hover,.drop-zone.drag-over{
    border-color:var(--gold);background:rgba(221,193,101,0.03);
    box-shadow:0 0 60px rgba(221,193,101,0.08);
  }
  .drop-zone h2{font-size:1.2rem;color:var(--gold-light);margin-bottom:8px;font-weight:700}
  .drop-zone p{font-size:0.82rem;color:var(--text-dim);line-height:1.6}
  .drop-zone code{background:var(--bg4);padding:2px 8px;border-radius:4px;font-size:0.75rem;color:var(--gold)}
  .drop-icon{font-size:2.5rem;margin-bottom:8px;opacity:0.7;animation:float 3s ease-in-out infinite}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  .or-divider{
    font-size:0.72rem;color:var(--text-dim);margin:6px 0;
    display:flex;align-items:center;gap:12px;width:100%;max-width:520px;
  }
  .or-divider::before,.or-divider::after{content:'';flex:1;height:1px;background:rgba(221,193,101,0.12)}

  .demo-btn{
    background:linear-gradient(135deg,var(--orange),#D04A10);
    color:#fff;border:none;padding:10px 24px;border-radius:8px;
    font-size:0.82rem;font-weight:600;cursor:pointer;
    transition:all 0.2s;box-shadow:0 4px 20px rgba(229,89,28,0.35);
  }
  .demo-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(229,89,28,0.5)}
  .auto-detect-btn{
    background:var(--bg3);border:1px solid rgba(221,193,101,0.2);
    color:var(--gold);padding:10px 24px;border-radius:8px;
    font-size:0.82rem;font-weight:500;cursor:pointer;transition:all 0.2s;
  }
  .auto-detect-btn:hover{background:var(--bg4);border-color:var(--gold)}
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

  /* ── Network Graph View ── */
  #graphView{display:none;flex:1;position:relative}
  #graphCanvas{width:100%;height:100%;display:block}

  /* ── Detail view ── */
  #detailView{display:none;flex:1;overflow-y:auto;padding:24px}

  /* ── Overview ── */
  #overviewView{display:none;flex:1;overflow-y:auto;padding:24px}
  .overview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
  .overview-card{
    background:var(--bg2);border:1px solid rgba(221,193,101,0.1);
    border-radius:var(--radius);padding:16px;cursor:pointer;
    transition:all 0.2s;position:relative;overflow:hidden;
  }
  .overview-card:hover{border-color:rgba(221,193,101,0.3);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,0.3)}
  .overview-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:3px;
    background:linear-gradient(90deg,var(--orange),var(--gold));opacity:0;transition:opacity 0.2s;
  }
  .overview-card:hover::before{opacity:1}
  .oc-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .oc-icon{font-size:1.6rem}
  .oc-name{font-size:0.9rem;font-weight:600;color:var(--gold-light)}
  .oc-transport{font-size:0.62rem;color:var(--text-dim)}
  .oc-tools{display:flex;flex-wrap:wrap;gap:4px}
  .oc-tool-tag{
    background:var(--bg);padding:3px 8px;border-radius:5px;
    font-size:0.65rem;color:var(--text-dim);font-family:'SF Mono',Menlo,monospace;
  }
  .oc-tool-more{font-size:0.65rem;color:var(--gold);padding:3px 4px}

  /* ── Detail header ── */
  .detail-header{
    display:flex;align-items:center;gap:16px;padding:20px;
    background:linear-gradient(135deg,var(--bg3),var(--bg2));
    border-radius:12px;border:1px solid rgba(221,193,101,0.1);
    position:relative;overflow:hidden;
  }
  .detail-header::after{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--orange),var(--gold),var(--orange));
    background-size:200% 100%;animation:shimmer 3s linear infinite;
  }
  @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
  .detail-icon{
    width:52px;height:52px;border-radius:14px;
    background:linear-gradient(135deg,var(--bg4),var(--bg3));
    display:flex;align-items:center;justify-content:center;font-size:26px;
    border:1px solid rgba(221,193,101,0.15);
  }
  .detail-title{font-size:1.2rem;font-weight:700;color:var(--gold-light)}
  .detail-meta{font-size:0.72rem;color:var(--text-dim);margin-top:3px;font-family:'SF Mono',Menlo,monospace}
  .detail-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .detail-badge{
    display:inline-flex;align-items:center;gap:4px;
    background:var(--bg4);border:1px solid rgba(221,193,101,0.12);
    border-radius:12px;padding:3px 10px;font-size:0.68rem;color:var(--gold);
  }
  .detail-badge .dot{width:6px;height:6px;border-radius:50%;background:var(--green)}
  .back-btn{
    position:absolute;top:16px;right:16px;background:var(--bg);border:1px solid rgba(221,193,101,0.15);
    color:var(--text-dim);padding:4px 12px;border-radius:6px;font-size:0.72rem;
    cursor:pointer;transition:all 0.15s;
  }
  .back-btn:hover{color:var(--gold);border-color:var(--gold)}

  /* ── Config panel ── */
  .config-panel{
    background:var(--bg2);border:1px solid rgba(221,193,101,0.08);
    border-radius:var(--radius);overflow:hidden;margin-top:16px;
  }
  .config-panel summary{
    padding:12px 16px;cursor:pointer;font-size:0.72rem;font-weight:600;
    color:var(--gold);text-transform:uppercase;letter-spacing:0.06em;
    border-bottom:1px solid rgba(221,193,101,0.06);
    user-select:none;list-style:none;display:flex;align-items:center;gap:8px;
  }
  .config-panel summary::before{content:'▸';transition:transform 0.2s}
  .config-panel[open] summary::before{transform:rotate(90deg)}
  .config-body{padding:14px}
  .config-json{
    background:var(--bg);border:1px solid rgba(221,193,101,0.06);
    border-radius:8px;padding:14px;font-family:'SF Mono',Menlo,monospace;
    font-size:0.72rem;color:var(--text);line-height:1.6;
    overflow-x:auto;white-space:pre-wrap;word-break:break-all;
  }

  /* ── Env tags ── */
  .env-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .env-tag{
    background:var(--bg);border:1px solid rgba(221,193,101,0.08);
    padding:3px 10px;border-radius:6px;font-size:0.68rem;
    font-family:'SF Mono',Menlo,monospace;color:var(--text-dim);
  }
  .env-tag .key{color:var(--gold)}
  .env-tag .val{opacity:0.6}

  /* ── Tools section ── */
  .tools-section{margin-top:20px}
  .tools-section h3{
    font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;
    color:var(--text-dim);margin-bottom:12px;font-weight:700;
    display:flex;align-items:center;gap:8px;
  }
  .tools-section h3 .count{
    background:var(--bg4);padding:2px 8px;border-radius:10px;
    font-size:0.68rem;color:var(--gold);
  }
  .tools-filter{
    background:var(--bg);border:1px solid rgba(221,193,101,0.1);
    color:var(--text);padding:6px 12px;border-radius:6px;font-size:0.75rem;
    outline:none;width:100%;margin-bottom:12px;font-family:inherit;transition:border-color 0.2s;
  }
  .tools-filter:focus{border-color:var(--gold)}
  .tools-filter::placeholder{color:var(--text-dim)}
  .tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px}

  .tool-card{
    background:var(--bg2);border:1px solid rgba(221,193,101,0.08);
    border-radius:var(--radius);padding:14px;cursor:pointer;
    transition:all 0.2s ease;position:relative;overflow:hidden;
  }
  .tool-card:hover{border-color:rgba(221,193,101,0.25);background:var(--bg3);transform:translateY(-1px)}
  .tool-card.expanded{grid-column:1/-1;border-color:rgba(221,193,101,0.3);box-shadow:0 0 40px rgba(221,193,101,0.06)}
  .tool-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--orange),var(--gold));
    opacity:0;transition:opacity 0.15s;
  }
  .tool-card:hover::before,.tool-card.expanded::before{opacity:1}
  .tool-name{font-size:0.82rem;font-weight:600;color:var(--gold-light);display:flex;align-items:center;gap:6px}
  .tool-name .fn-icon{font-size:0.68rem;opacity:0.4;font-family:'SF Mono',Menlo,monospace;color:var(--orange)}
  .tool-desc{font-size:0.72rem;color:var(--text-dim);margin-top:4px;line-height:1.5}

  /* ── Tool detail (expanded) ── */
  .tool-detail{margin-top:14px;padding-top:14px;border-top:1px solid rgba(221,193,101,0.08)}
  .schema-title{font-size:0.68rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-dim);margin-bottom:8px;font-weight:700}
  .param-row{
    display:flex;align-items:flex-start;gap:8px;padding:7px 10px;
    border-radius:6px;font-size:0.75rem;background:var(--bg);margin-bottom:3px;
  }
  .param-name{font-family:'SF Mono',Menlo,monospace;color:var(--gold);font-weight:500;min-width:90px}
  .param-type{font-family:'SF Mono',Menlo,monospace;color:var(--orange);font-size:0.68rem;min-width:55px}
  .param-desc{color:var(--text-dim);flex:1}
  .param-required{font-size:0.58rem;background:rgba(229,89,28,0.15);color:var(--orange);padding:1px 6px;border-radius:4px;font-weight:600}

  /* ── Test panel ── */
  .test-panel{
    background:var(--bg);border:1px solid rgba(221,193,101,0.08);
    border-radius:8px;padding:14px;margin-top:10px;
  }
  .test-panel h4{font-size:0.72rem;color:var(--gold);margin-bottom:10px;font-weight:700}
  .test-input{
    width:100%;background:var(--bg2);border:1px solid rgba(221,193,101,0.12);
    color:var(--text);font-family:'SF Mono',Menlo,monospace;font-size:0.72rem;
    padding:10px;border-radius:6px;resize:vertical;min-height:60px;
    outline:none;transition:border-color 0.2s;
  }
  .test-input:focus{border-color:var(--gold)}
  .test-actions{display:flex;gap:8px;margin-top:8px}
  .test-btn{
    background:linear-gradient(135deg,var(--orange),#D04A10);border:none;
    color:#fff;padding:7px 18px;border-radius:6px;font-size:0.72rem;
    cursor:pointer;transition:all 0.15s;font-weight:600;
  }
  .test-btn:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(229,89,28,0.3)}
  .copy-btn{
    background:var(--bg3);border:1px solid rgba(221,193,101,0.15);
    color:var(--gold);padding:7px 14px;border-radius:6px;font-size:0.72rem;
    cursor:pointer;transition:all 0.15s;font-weight:500;
  }
  .copy-btn:hover{background:var(--bg4);border-color:var(--gold)}
  .test-result{
    margin-top:10px;padding:12px;background:var(--bg2);
    border-radius:6px;font-family:'SF Mono',Menlo,monospace;
    font-size:0.7rem;color:var(--text-dim);line-height:1.6;
    white-space:pre-wrap;display:none;border:1px solid rgba(221,193,101,0.06);
  }
  .test-result.visible{display:block}

  /* ── Empty state ── */
  .empty-tools{text-align:center;padding:40px;color:var(--text-dim);font-size:0.82rem}
  .empty-tools .icon{font-size:2rem;margin-bottom:8px;opacity:0.3}

  /* ── Toast ── */
  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);
    background:var(--bg3);border:1px solid rgba(221,193,101,0.2);
    border-radius:10px;padding:10px 24px;color:var(--gold);font-size:0.78rem;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:300;
    opacity:0;transition:all 0.3s ease;font-weight:500;
  }
  .toast.visible{transform:translateX(-50%) translateY(0);opacity:1}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:5px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(221,193,101,0.12);border-radius:3px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(221,193,101,0.25)}

  /* ── Fade in ── */
  .fade-in{animation:fadeIn 0.25s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

  .file-input{display:none}

  /* ── Responsive ── */
  @media(max-width:768px){
    .sidebar{width:220px;min-width:220px}
    .tools-grid{grid-template-columns:1fr}
    .search-input{width:160px}
    .search-input:focus{width:200px}
    .search-results{width:320px}
  }
  @media(max-width:600px){
    .app{flex-direction:column}
    .sidebar{width:100%;min-width:100%;max-height:180px;border-right:none;border-bottom:1px solid rgba(221,193,101,0.08)}
    .stats-bar{grid-template-columns:1fr 1fr 1fr}
    .search-results{width:calc(100vw - 32px);right:-60px}
  }

  /* ── Keyboard hint ── */
  .kbd{
    display:inline-block;background:var(--bg4);border:1px solid rgba(221,193,101,0.15);
    padding:1px 5px;border-radius:3px;font-size:0.6rem;color:var(--text-dim);

  const l = name.toLowerCase();
  for (const [k, v] of Object.entries(SERVER_ICONS)) { if (l.includes(k)) return v; }
  return '⚙️';
}
function getTransport(cfg) {
  if (cfg.url) return 'sse';
  if (cfg.command) return 'stdio';
  return 'unknown';
}
function getToolCount(name) { return (KNOWN_TOOLS[name] || []).length; }
function getTotalTools() {
  let t = 0;
  for (const n of Object.keys(servers)) t += getToolCount(n);
  return t;
}
function getTotalParams() {
  let p = 0;
  for (const n of Object.keys(servers)) {
    const tools = KNOWN_TOOLS[n] || [];
    for (const t of tools) p += (t.params || []).length;
  }
  return p;
}

// ── Particle background ──
function initParticles() {
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  let w, h, particles = [];

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * w, y: Math.random() * h,
      vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3,
      r: Math.random() * 1.5 + 0.5, a: Math.random() * 0.3 + 0.05
    });
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    for (const p of particles) {
      p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = w; if (p.x > w) p.x = 0;
      if (p.y < 0) p.y = h; if (p.y > h) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(221,193,101,${p.a})`;
      ctx.fill();
    }
    // Draw connections
    for (let i = 0; i < particles.length; i++) {
      for (let j = i + 1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 120) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = `rgba(221,193,101,${0.06 * (1 - d / 120)})`;
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
}

// ── Network Graph ──
let graphNodes = [], graphEdges = [];

function initGraph() {
  const canvas = document.getElementById('graphCanvas');
  const ctx = canvas.getContext('2d');
  const container = document.getElementById('graphView');
  let w, h;
  let dragging = null, dragOff = { x: 0, y: 0 };
  let hovered = null;

  function resize() {
    const rect = container.getBoundingClientRect();
    w = canvas.width = rect.width;
    h = canvas.height = rect.height;
  }
  resize();
  window.addEventListener('resize', resize);

  // Build nodes from servers
  graphNodes = [];
  graphEdges = [];
  const names = Object.keys(servers);
  const cx = w / 2, cy = h / 2;

  // Center hub node
  graphNodes.push({ id: 'hub', x: cx, y: cy, r: 28, label: 'MCP Hub', icon: '⚡', isHub: true, vx: 0, vy: 0 });

  names.forEach((name, i) => {
    const angle = (i / names.length) * Math.PI * 2 - Math.PI / 2;
    const dist = 160 + Math.random() * 40;
    graphNodes.push({
      id: name, x: cx + Math.cos(angle) * dist, y: cy + Math.sin(angle) * dist,
      r: 18 + getToolCount(name) * 1.5, label: name, icon: getIcon(name),
      tools: getToolCount(name), transport: getTransport(servers[name]),
      vx: 0, vy: 0
    });
    graphEdges.push({ from: 'hub', to: name });
  });

  // Simple force simulation
  function simulate() {
    const k = 0.005; // spring constant
    const repulsion = 3000;
    const damping = 0.85;

    for (const node of graphNodes) {
      if (node.isHub) continue;
      // Repulsion between non-hub nodes
      for (const other of graphNodes) {
        if (other === node) continue;
        const dx = node.x - other.x, dy = node.y - other.y;
        const d = Math.max(Math.sqrt(dx * dx + dy * dy), 1);
        const f = repulsion / (d * d);
        if (!node.isHub) { node.vx += (dx / d) * f * 0.01; node.vy += (dy / d) * f * 0.01; }
      }
      // Spring to hub
      const hub = graphNodes[0];
      const dx = node.x - hub.x, dy = node.y - hub.y;
      const d = Math.sqrt(dx * dx + dy * dy);
      const targetDist = 160 + node.r * 2;
      const f = (d - targetDist) * k;
      node.vx -= (dx / d) * f;
      node.vy -= (dy / d) * f;

      // Center gravity
      node.vx += (cx - node.x) * 0.0003;
      node.vy += (cy - node.y) * 0.0003;

      node.vx *= damping;
      node.vy *= damping;
      if (node !== dragging) {
        node.x += node.vx;
        node.y += node.vy;
      }
    }
  }

  function draw() {
    ctx.clearRect(0, 0, w, h);
    const time = Date.now() * 0.001;

    // Edges
    for (const e of graphEdges) {
      const from = graphNodes.find(n => n.id === e.from);
      const to = graphNodes.find(n => n.id === e.to);
      if (!from || !to) continue;

      const grad = ctx.createLinearGradient(from.x, from.y, to.x, to.y);
      grad.addColorStop(0, 'rgba(229,89,28,0.4)');
      grad.addColorStop(1, 'rgba(221,193,101,0.15)');
      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = hovered === to ? 2.5 : 1.5;
      ctx.stroke();

      // Animated pulse along edge
      const pulse = ((time * 0.5 + graphEdges.indexOf(e) * 0.3) % 1);
      const px = from.x + (to.x - from.x) * pulse;
      const py = from.y + (to.y - from.y) * pulse;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(229,89,28,${0.6 * (1 - Math.abs(pulse - 0.5) * 2)})`;
      ctx.fill();
    }

    // Nodes
    for (const node of graphNodes) {
      const isHov = hovered === node;
      const r = node.r + (isHov ? 4 : 0);

      // Glow
      const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, r * 2.5);
      if (node.isHub) {
        glow.addColorStop(0, `rgba(229,89,28,${0.15 + Math.sin(time * 2) * 0.05})`);
        glow.addColorStop(1, 'rgba(229,89,28,0)');
      } else {
        const c = node.transport === 'stdio' ? '96,165,250' : '74,222,128';
        glow.addColorStop(0, `rgba(${c},${isHov ? 0.2 : 0.08})`);
        glow.addColorStop(1, `rgba(${c},0)`);
      }
      ctx.beginPath();
      ctx.arc(node.x, node.y, r * 2.5, 0, Math.PI * 2);
      ctx.fillStyle = glow;
      ctx.fill();

      // Circle
      ctx.beginPath();
      ctx.arc(node.x, node.y, r, 0, Math.PI * 2);
      if (node.isHub) {
        const grad = ctx.createLinearGradient(node.x - r, node.y - r, node.x + r, node.y + r);
        grad.addColorStop(0, '#E5591C');
        grad.addColorStop(1, '#DDC165');
        ctx.fillStyle = grad;
      } else {
        ctx.fillStyle = isHov ? '#3A2000' : '#2E1800';
      }
      ctx.fill();
      ctx.strokeStyle = node.isHub ? 'rgba(255,233,163,0.5)' : (isHov ? 'rgba(221,193,101,0.5)' : 'rgba(221,193,101,0.15)');
      ctx.lineWidth = isHov ? 2 : 1;
      ctx.stroke();

      // Icon
      ctx.font = `${node.isHub ? 20 : 16}px system-ui`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(node.icon, node.x, node.y);

      // Label
      ctx.font = `${isHov ? '600' : '500'} ${isHov ? 12 : 10}px -apple-system, system-ui, sans-serif`;
      ctx.fillStyle = isHov ? '#FFE9A3' : '#E8D5B8';
      ctx.fillText(node.label, node.x, node.y + r + 14);

      // Tool count
      if (node.tools) {
        ctx.font = '600 9px -apple-system, system-ui, sans-serif';
        ctx.fillStyle = 'rgba(221,193,101,0.6)';
        ctx.fillText(`${node.tools} tools`, node.x, node.y + r + 26);
      }
    }

    simulate();
    graphAnimId = requestAnimationFrame(draw);
  }

  // Mouse interaction
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    hovered = null;
    for (const node of graphNodes) {
      const dx = mx - node.x, dy = my - node.y;
      if (Math.sqrt(dx * dx + dy * dy) < node.r + 8) { hovered = node; break; }
    }
    canvas.style.cursor = hovered ? 'pointer' : 'default';
    if (dragging) {
      dragging.x = mx + dragOff.x;
      dragging.y = my + dragOff.y;
    }
  };
  canvas.onmousedown = (e) => {
    if (hovered && !hovered.isHub) {
      dragging = hovered;
      const rect = canvas.getBoundingClientRect();
      dragOff.x = hovered.x - (e.clientX - rect.left);
      dragOff.y = hovered.y - (e.clientY - rect.top);
    }
  };
  canvas.onmouseup = () => {
    if (dragging && hovered === dragging) {
      selectServer(dragging.id);
      setView('list');
    }
    dragging = null;
  };
  canvas.onmouseleave = () => { hovered = null; dragging = null; };

  if (graphAnimId) cancelAnimationFrame(graphAnimId);
  draw();
}

// ── View switching ──
function setView(view) {
  currentView = view;
  document.getElementById('viewList').classList.toggle('active', view === 'list');
  document.getElementById('viewGraph').classList.toggle('active', view === 'graph');
  document.getElementById('viewGrid').classList.toggle('active', view === 'grid');

  document.getElementById('graphView').style.display = view === 'graph' ? 'flex' : 'none';
  document.getElementById('detailView').style.display = view === 'list' && activeServer ? '' : 'none';
  document.getElementById('overviewView').style.display = view === 'grid' ? '' : 'none';

  if (view === 'graph') initGraph();
  if (view === 'grid') renderOverview();
  if (view === 'list' && activeServer) renderDetail();
  if (graphAnimId && view !== 'graph') { cancelAnimationFrame(graphAnimId); graphAnimId = null; }
}

// ── Load config ──
function loadConfig(data) {
  try {
    config = typeof data === 'string' ? JSON.parse(data) : data;
    servers = config.mcpServers || config.MCP_SERVERS || config;
    if (typeof servers !== 'object' || Array.isArray(servers)) throw new Error('Invalid config structure — expected mcpServers object');

    const count = Object.keys(servers).length;
    document.getElementById('serverCount').textContent = `${count} server${count !== 1 ? 's' : ''}`;
    document.getElementById('sidebar').style.display = '';
    document.getElementById('welcome').style.display = 'none';
    document.getElementById('exportBtn').style.display = '';
    updateStats();
    renderServerList();
    if (count > 0) selectServer(Object.keys(servers)[0]);
    showToast(`Loaded ${count} MCP servers · ${getTotalTools()} tools`);
  } catch (e) {
    showToast('Error: ' + e.message);
  }
}

function updateStats() {
  document.getElementById('statServers').textContent = Object.keys(servers).length;
  document.getElementById('statTools').textContent = getTotalTools();
  document.getElementById('statParams').textContent = getTotalParams();
}

// ── Server list ──
function renderServerList() {
  const list = document.getElementById('serverList');
  list.innerHTML = '';
  for (const [name, cfg] of Object.entries(servers)) {
    const type = getTransport(cfg);
    const tc = getToolCount(name);
    const el = document.createElement('div');
    el.className = 'server-item' + (name === activeServer ? ' active' : '');
    el.onclick = () => { selectServer(name); if (currentView !== 'list') setView('list'); };
    el.innerHTML = `
      <div class="server-dot ${type}"></div>
      <div class="server-info">
        <div class="server-name">${getIcon(name)} ${name}</div>
        <div class="server-type">${type}${tc ? ` · ${tc} tools` : ''}</div>
      </div>
      ${tc ? `<span class="tool-count-badge">${tc}</span>` : ''}
    `;
    list.appendChild(el);
  }
}

// ── Select server ──
function selectServer(name) {
  activeServer = name;
  expandedTool = null;
  toolFilter = '';
  renderServerList();
  if (currentView === 'list') {
    document.getElementById('detailView').style.display = '';
    document.getElementById('graphView').style.display = 'none';
    document.getElementById('overviewView').style.display = 'none';
    renderDetail();
  }
}

// ── Detail view ──
function renderDetail() {
  const cfg = servers[activeServer];
  if (!cfg) return;
  const type = getTransport(cfg);
  const tools = KNOWN_TOOLS[activeServer] || [];
  const detail = document.getElementById('detailView');
  detail.style.display = '';
  detail.className = 'fade-in';

  const envKeys = cfg.env ? Object.keys(cfg.env).filter(k => cfg.env[k]) : [];
  const cmdLine = cfg.command ? [cfg.command, ...(cfg.args || [])].join(' ') : cfg.url || 'N/A';

  const filteredTools = toolFilter
    ? tools.filter(t => t.name.toLowerCase().includes(toolFilter) || t.description.toLowerCase().includes(toolFilter))
    : tools;

  let html = `
    <div class="detail-header">
      <div class="detail-icon">${getIcon(activeServer)}</div>
      <div style="flex:1">
        <div class="detail-title">${activeServer}</div>
        <div class="detail-meta">${escHtml(cmdLine)}</div>
        <div class="detail-badges">
          <span class="detail-badge"><span class="dot" style="background:${TRANSPORT_COLORS[type]}"></span>${type.toUpperCase()}</span>
          ${tools.length ? `<span class="detail-badge">${tools.length} tools</span>` : ''}
          ${envKeys.length ? `<span class="detail-badge">${envKeys.length} env vars</span>` : ''}
        </div>
      </div>
    </div>

    ${envKeys.length ? `
    <div class="env-list" style="margin-top:10px">
      ${envKeys.map(k => {
        const v = String(cfg.env[k]);
        const masked = v.length > 8 ? v.slice(0, 4) + '····' + v.slice(-2) : '····';
        return `<span class="env-tag"><span class="key">${escHtml(k)}</span>=<span class="val">${masked}</span></span>`;
      }).join('')}
    </div>
    ` : ''}

    <details class="config-panel" style="margin-top:12px">
      <summary>Raw Configuration</summary>
      <div class="config-body"><div class="config-json">${escHtml(JSON.stringify(cfg, null, 2))}</div></div>
    </details>
  `;

  if (tools.length > 0) {
    html += `
      <div class="tools-section">
        <h3>Available Tools <span class="count">${tools.length}</span></h3>
        ${tools.length > 4 ? `<input class="tools-filter" type="text" placeholder="Filter tools…" value="${escHtml(toolFilter)}" oninput="toolFilter=this.value.toLowerCase();renderDetail()">` : ''}
        <div class="tools-grid">
          ${filteredTools.map((t, i) => renderToolCard(t, tools.indexOf(t))).join('')}
        </div>
        ${filteredTools.length === 0 ? '<p style="color:var(--text-dim);font-size:0.78rem;padding:12px">No tools match filter</p>' : ''}
      </div>
    `;
  } else {
    html += `
      <div class="empty-tools">
        <div class="icon">🔧</div>
        <p>Tool schemas not available for this server</p>
        <p style="font-size:0.72rem;color:var(--text-dim);margin-top:4px">
          Known schemas: ${Object.keys(KNOWN_TOOLS).join(', ')}
        </p>
      </div>
    `;
  }

  detail.innerHTML = html;
}

function renderToolCard(tool, index) {
  const isExpanded = expandedTool === index;
  let html = `
    <div class="tool-card${isExpanded ? ' expanded' : ''}" onclick="toggleTool(${index})">
      <div class="tool-name"><span class="fn-icon">ƒ</span> ${escHtml(tool.name)}</div>
      <div class="tool-desc">${escHtml(tool.description)}</div>
  `;

  if (isExpanded) {
    html += `<div class="tool-detail">`;
    if (tool.params && tool.params.length > 0) {
      html += `
        <div class="schema-section">
          <div class="schema-title">Parameters</div>
          ${tool.params.map(p => `
            <div class="param-row">
              <span class="param-name">${escHtml(p.name)}</span>
              <span class="param-type">${escHtml(p.type)}</span>
              <span class="param-desc">${escHtml(p.description)}</span>
              ${p.required ? '<span class="param-required">required</span>' : ''}
            </div>
          `).join('')}
        </div>
      `;
    }

    const sampleInput = {};
    (tool.params || []).filter(p => p.required).forEach(p => {
      if (p.type === 'string') sampleInput[p.name] = '';
      else if (p.type === 'number') sampleInput[p.name] = 0;
      else if (p.type === 'array') sampleInput[p.name] = [];
      else if (p.type === 'boolean') sampleInput[p.name] = false;
      else sampleInput[p.name] = null;
    });

    html += `
      <div class="test-panel" onclick="event.stopPropagation()">
        <h4>Test Input</h4>
        <textarea class="test-input" id="testInput-${index}" spellcheck="false">${escHtml(JSON.stringify(sampleInput, null, 2))}</textarea>
        <div class="test-actions">
          <button class="test-btn" onclick="simulateTest(${index})">▶ Simulate Call</button>
          <button class="copy-btn" onclick="copyMcpCall(${index})">Copy JSON-RPC</button>
        </div>
        <div class="test-result" id="testResult-${index}"></div>
      </div>
    `;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function toggleTool(index) {
  expandedTool = expandedTool === index ? null : index;
  renderDetail();
}

function simulateTest(index) {
  const input = document.getElementById(`testInput-${index}`);
  const result = document.getElementById(`testResult-${index}`);
  try {
    const parsed = JSON.parse(input.value);
    const tools = KNOWN_TOOLS[activeServer];
    const tool = tools[index];
    const rpc = {
      jsonrpc: "2.0", id: 1,
      method: "tools/call",
      params: { name: tool.name, arguments: parsed }
    };
    result.className = 'test-result visible';
    result.innerHTML =
      `<span style="color:var(--gold)">→ ${escHtml(activeServer)}.${escHtml(tool.name)}()</span>\n\n` +
      `<span style="color:var(--text-dim)">// JSON-RPC request:</span>\n` +
      `<span style="color:var(--green)">${escHtml(JSON.stringify(rpc, null, 2))}</span>\n\n` +
      `<span style="color:var(--text-dim)">// Transport: ${getTransport(servers[activeServer]).toUpperCase()} → ${escHtml(activeServer)}</span>`;
  } catch (e) {
    result.className = 'test-result visible';
    result.innerHTML = `<span style="color:var(--red)">Invalid JSON: ${escHtml(e.message)}</span>`;
  }
}

function copyMcpCall(index) {
  try {
    const input = document.getElementById(`testInput-${index}`);
    const parsed = JSON.parse(input.value);
    const tools = KNOWN_TOOLS[activeServer];
    const tool = tools[index];
    const rpc = { jsonrpc: "2.0", id: 1, method: "tools/call", params: { name: tool.name, arguments: parsed }};
    navigator.clipboard.writeText(JSON.stringify(rpc, null, 2));
    showToast('JSON-RPC copied to clipboard');
  } catch (e) {
    showToast('Fix JSON input first');
  }
}

// ── Overview grid ──
function renderOverview() {
  const container = document.getElementById('overviewView');
  let html = '<div class="overview-grid">';
  for (const [name, cfg] of Object.entries(servers)) {
    const tools = KNOWN_TOOLS[name] || [];
    const type = getTransport(cfg);
    const maxShow = 5;
    html += `
      <div class="overview-card" onclick="selectServer('${name}');setView('list')">
        <div class="oc-header">
          <span class="oc-icon">${getIcon(name)}</span>
          <div>
            <div class="oc-name">${escHtml(name)}</div>
            <div class="oc-transport">${type} · ${tools.length} tools</div>
          </div>
        </div>
        <div class="oc-tools">
          ${tools.slice(0, maxShow).map(t => `<span class="oc-tool-tag">${escHtml(t.name)}</span>`).join('')}
          ${tools.length > maxShow ? `<span class="oc-tool-more">+${tools.length - maxShow} more</span>` : ''}
        </div>
      </div>
    `;
  }
  html += '</div>';
  container.innerHTML = html;
}

// ── Global search ──
const searchInput = document.getElementById('globalSearch');
const searchResults = document.getElementById('searchResults');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q || !config) { searchResults.classList.remove('visible'); return; }

  const results = [];
  for (const [name, cfg] of Object.entries(servers)) {
    const tools = KNOWN_TOOLS[name] || [];
    for (const tool of tools) {
      const nameMatch = tool.name.toLowerCase().includes(q);
      const descMatch = tool.description.toLowerCase().includes(q);
      if (nameMatch || descMatch) {
        results.push({ server: name, tool, nameMatch, descMatch });
      }
    }
    // Also match server names
    if (name.toLowerCase().includes(q)) {
      results.push({ server: name, tool: null, nameMatch: true, descMatch: false });
    }
  }

  if (results.length === 0) {
    searchResults.innerHTML = '<div class="search-result-item"><span style="color:var(--text-dim)">No results found</span></div>';
  } else {
    searchResults.innerHTML = results.slice(0, 12).map(r => {
      if (!r.tool) {
        return `<div class="search-result-item" onclick="selectServer('${r.server}');setView('list');clearSearch()">
          <div class="sr-name">${getIcon(r.server)} ${highlight(r.server, q)}</div>
          <div class="sr-server">Server · ${getToolCount(r.server)} tools</div>
        </div>`;
      }
      return `<div class="search-result-item" onclick="selectServer('${r.server}');setView('list');clearSearch()">
        <div class="sr-name"><span class="fn-icon" style="color:var(--orange);font-size:0.7rem">ƒ</span> ${highlight(r.tool.name, q)}</div>
        <div class="sr-server">${getIcon(r.server)} ${r.server}</div>
        <div class="sr-desc">${highlight(r.tool.description, q)}</div>
      </div>`;
    }).join('');
  }
  searchResults.classList.add('visible');
});

searchInput.addEventListener('blur', () => {
  setTimeout(() => searchResults.classList.remove('visible'), 200);
});
searchInput.addEventListener('focus', () => {
  if (searchInput.value.trim()) searchInput.dispatchEvent(new Event('input'));
});

function clearSearch() {
  searchInput.value = '';
  searchResults.classList.remove('visible');
}

function highlight(text, query) {
  const idx = text.toLowerCase().indexOf(query);
  if (idx === -1) return escHtml(text);
  return escHtml(text.slice(0, idx)) + `<span class="sr-highlight">${escHtml(text.slice(idx, idx + query.length))}</span>` + escHtml(text.slice(idx + query.length));
}

// ── File handling ──
function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => loadConfig(e.target.result);
  reader.readAsText(file);
}

function loadDemo() { loadConfig(DEMO_CONFIG); }

function autoDetect() {
  showToast('Browser cannot read local files — use the file picker or paste');
  document.getElementById('fileInput').click();
}

async function loadFromClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    loadConfig(text);
  } catch (e) {
    showToast('Clipboard access denied — use drag & drop or file picker');
  }
}

function exportConfig() {
  if (!config) return;
  const blob = new Blob([JSON.stringify(config, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'mcp_config.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('Config exported');
}

// ── Drag & drop ──
['dragenter', 'dragover'].forEach(e => {
  document.addEventListener(e, ev => {
    ev.preventDefault();
    const dz = document.getElementById('dropZone');
    if (dz) dz.classList.add('drag-over');
  });
});
['dragleave', 'drop'].forEach(e => {
  document.addEventListener(e, ev => {
    ev.preventDefault();
    const dz = document.getElementById('dropZone');
    if (dz) dz.classList.remove('drag-over');
  });
});
document.addEventListener('drop', ev => {
  const file = ev.dataTransfer.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = e => loadConfig(e.target.result);
    reader.readAsText(file);
  }
});

// ── Keyboard shortcuts ──
document.addEventListener('keydown', e => {
  // Cmd+V to paste config when no server loaded
  if ((e.metaKey || e.ctrlKey) && e.key === 'v' && !config) {
    loadFromClipboard();
  }
  // Cmd+K to focus search
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    searchInput.focus();
  }
  // Escape to close search
  if (e.key === 'Escape') {
    clearSearch();
    searchInput.blur();
  }
  // 1/2/3 for views
  if (!e.metaKey && !e.ctrlKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
    if (e.key === '1' && config) setView('list');
    if (e.key === '2' && config) setView('graph');
    if (e.key === '3' && config) setView('grid');
  }
});

// ── Utils ──
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ──
initParticles();
</script>
</body>
